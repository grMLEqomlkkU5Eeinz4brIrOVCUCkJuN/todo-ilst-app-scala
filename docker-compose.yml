services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: db
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO_NAME}:backend-latest
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mariadb://db:3306/db
      DB_USER: root
      DB_PASSWORD: password
      CORS_ORIGINS: '["http://localhost"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO_NAME}:frontend-latest
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
